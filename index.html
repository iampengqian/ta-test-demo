<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #222442;
      --panel-border: rgba(255, 255, 255, 0.08);
      --cell-hidden: #34375d;
      --cell-hidden-hover: #3f4372;
      --cell-open: #f0f3ff;
      --cell-shadow: rgba(0, 0, 0, 0.28);
      --text: #f5f7ff;
      --muted: #acb4d6;
      --accent: #ff9f1c;
      --danger: #ff4d6d;
      --success: #5dd39e;
      --one: #2f80ed;
      --two: #27ae60;
      --three: #eb5757;
      --four: #1f3c88;
      --five: #8b1e3f;
      --six: #2ec4c7;
      --seven: #161616;
      --eight: #7f8c8d;
      --board-size: min(92vw, 520px);
      --gap: 6px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(92, 103, 196, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 159, 28, 0.12), transparent 30%),
        linear-gradient(180deg, #20233f 0%, var(--bg) 60%);
    }

    .game-shell {
      width: min(100%, 620px);
      background: rgba(23, 25, 46, 0.88);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(12px);
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .status-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-card,
    .restart-button {
      min-height: 56px;
      border-radius: 18px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .status-card {
      min-width: 124px;
      padding: 10px 14px;
      display: grid;
      gap: 4px;
    }

    .status-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .restart-button {
      appearance: none;
      border-width: 1px;
      color: var(--text);
      padding: 0 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .restart-button:hover,
    .restart-button:focus-visible {
      background: #2d325a;
      transform: translateY(-1px);
      outline: none;
    }

    .board-wrap {
      position: relative;
    }

    .board {
      width: var(--board-size);
      max-width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: var(--gap);
      padding: var(--gap);
      background: rgba(255, 255, 255, 0.035);
      border-radius: 24px;
      user-select: none;
      touch-action: manipulation;
    }

    .cell {
      aspect-ratio: 1;
      border: none;
      border-radius: 14px;
      background: var(--cell-hidden);
      color: var(--text);
      font-size: clamp(18px, 3.7vw, 24px);
      font-weight: 800;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.2), 0 6px 16px var(--cell-shadow);
      transition: transform 120ms ease, background 120ms ease;
    }

    .cell:hover,
    .cell:focus-visible {
      background: var(--cell-hidden-hover);
      transform: translateY(-1px);
      outline: none;
    }

    .cell.revealed {
      background: var(--cell-open);
      cursor: default;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .cell.revealed:hover {
      transform: none;
    }

    .cell.mine-hit,
    .cell.mine-revealed {
      background: #ffd7de;
    }

    .cell.flagged::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 18px solid var(--accent);
      transform: translateX(3px);
    }

    .cell.flagged::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 22px;
      background: #ffe8bf;
      border-radius: 999px;
      transform: translateX(-7px);
    }

    .cell.mine::before {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.18);
    }

    .cell.n1 { color: var(--one); }
    .cell.n2 { color: var(--two); }
    .cell.n3 { color: var(--three); }
    .cell.n4 { color: var(--four); }
    .cell.n5 { color: var(--five); }
    .cell.n6 { color: var(--six); }
    .cell.n7 { color: var(--seven); }
    .cell.n8 { color: var(--eight); }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(11, 13, 24, 0.72);
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: min(100%, 320px);
      background: rgba(31, 35, 62, 0.96);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 24px 22px;
      text-align: center;
      box-shadow: 0 20px 46px rgba(0, 0, 0, 0.35);
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .modal button {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff9f1c, #ffbf69);
      color: #241f17;
      font-size: 16px;
      font-weight: 800;
      padding: 12px 18px;
      cursor: pointer;
    }

    .tips {
      margin: 16px auto 0;
      width: min(var(--board-size), 100%);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 640px) {
      .game-shell {
        padding: 18px 14px;
        border-radius: 22px;
      }

      .game-header {
        flex-direction: column;
        align-items: stretch;
      }

      .status-group {
        width: 100%;
      }

      .status-card,
      .restart-button {
        flex: 1;
      }

      .restart-button {
        width: 100%;
      }

      .cell {
        border-radius: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div class="status-group">
        <section class="status-card" aria-label="remaining mines">
          <span class="status-label">Mines Left</span>
          <strong class="status-value" id="mine-count">10</strong>
        </section>
        <section class="status-card" aria-label="timer">
          <span class="status-label">Timer</span>
          <strong class="status-value" id="timer">000</strong>
        </section>
      </div>
      <button class="restart-button" id="restart-button" type="button">重新开始</button>
    </header>

    <div class="board-wrap">
      <section class="board" id="board" aria-label="Minesweeper board"></section>
      <div class="overlay" id="overlay" aria-live="polite">
        <div class="modal">
          <h2 id="overlay-title"></h2>
          <p id="overlay-message"></p>
          <button id="overlay-restart" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <p class="tips">左键揭开，右键标旗。已揭开的数字格支持右键长按或连续右键快速展开周围。</p>
  </main>

  <script>
    (() => {
      const SIZE = 9;
      const MINES = 10;
      const LONG_PRESS_MS = 320;
      const DOUBLE_RIGHT_MS = 320;

      const boardElement = document.getElementById("board");
      const mineCountElement = document.getElementById("mine-count");
      const timerElement = document.getElementById("timer");
      const restartButton = document.getElementById("restart-button");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlay-title");
      const overlayMessage = document.getElementById("overlay-message");
      const overlayRestart = document.getElementById("overlay-restart");

      let board = [];
      let firstReveal = true;
      let gameOver = false;
      let timer = 0;
      let timerId = null;
      let revealedSafeCells = 0;
      let flagsPlaced = 0;
      let rightPressTimer = null;
      let touchHoldTimer = null;
      let lastRightClick = { index: -1, time: 0 };

      function createCell(index) {
        return {
          index,
          x: index % SIZE,
          y: Math.floor(index / SIZE),
          isMine: false,
          adjacent: 0,
          revealed: false,
          flagged: false
        };
      }

      function resetGame() {
        board = Array.from({ length: SIZE * SIZE }, (_, index) => createCell(index));
        firstReveal = true;
        gameOver = false;
        timer = 0;
        revealedSafeCells = 0;
        flagsPlaced = 0;
        lastRightClick = { index: -1, time: 0 };
        stopTimer();
        timerElement.textContent = "000";
        hideOverlay();
        renderBoard();
        updateMineCounter();
      }

      function startTimer() {
        if (timerId !== null) return;
        timerId = window.setInterval(() => {
          timer = Math.min(999, timer + 1);
          timerElement.textContent = String(timer).padStart(3, "0");
        }, 1000);
      }

      function stopTimer() {
        if (timerId !== null) {
          window.clearInterval(timerId);
          timerId = null;
        }
      }

      function placeMines(safeIndex) {
        const candidates = board
          .map((cell) => cell.index)
          .filter((index) => index !== safeIndex);

        for (let i = candidates.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
        }

        candidates.slice(0, MINES).forEach((index) => {
          board[index].isMine = true;
        });

        board.forEach((cell) => {
          cell.adjacent = getNeighbors(cell.index).filter((neighbor) => board[neighbor].isMine).length;
        });
      }

      function getNeighbors(index) {
        const neighbors = [];
        const x = index % SIZE;
        const y = Math.floor(index / SIZE);

        for (let dy = -1; dy <= 1; dy += 1) {
          for (let dx = -1; dx <= 1; dx += 1) {
            if (dx === 0 && dy === 0) continue;
            const nx = x + dx;
            const ny = y + dy;
            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
              neighbors.push(ny * SIZE + nx);
            }
          }
        }

        return neighbors;
      }

      function revealCell(index) {
        const cell = board[index];
        if (!cell || cell.revealed || cell.flagged || gameOver) return;

        if (firstReveal) {
          placeMines(index);
          firstReveal = false;
          startTimer();
        }

        cell.revealed = true;

        if (cell.isMine) {
          finishGame(false, index);
          return;
        }

        revealedSafeCells += 1;

        if (cell.adjacent === 0) {
          floodReveal(index);
        }

        renderBoard();
        checkWin();
      }

      function floodReveal(startIndex) {
        const queue = [startIndex];
        const visited = new Set([startIndex]);

        while (queue.length > 0) {
          const current = queue.shift();
          getNeighbors(current).forEach((neighborIndex) => {
            if (visited.has(neighborIndex)) return;
            visited.add(neighborIndex);
            const neighbor = board[neighborIndex];
            if (neighbor.revealed || neighbor.flagged || neighbor.isMine) return;
            neighbor.revealed = true;
            revealedSafeCells += 1;
            if (neighbor.adjacent === 0) {
              queue.push(neighborIndex);
            }
          });
        }
      }

      function toggleFlag(index) {
        const cell = board[index];
        if (!cell || cell.revealed || gameOver) return;
        cell.flagged = !cell.flagged;
        flagsPlaced += cell.flagged ? 1 : -1;
        updateMineCounter();
        renderBoard();
      }

      function chordReveal(index) {
        const cell = board[index];
        if (!cell || !cell.revealed || cell.adjacent === 0 || gameOver) return;
        const neighbors = getNeighbors(index);
        const flaggedNeighbors = neighbors.filter((neighborIndex) => board[neighborIndex].flagged).length;
        if (flaggedNeighbors !== cell.adjacent) return;

        neighbors.forEach((neighborIndex) => {
          const neighbor = board[neighborIndex];
          if (!neighbor.flagged && !neighbor.revealed) {
            revealCell(neighborIndex);
          }
        });
      }

      function revealAllMines(triggerIndex) {
        board.forEach((cell) => {
          if (cell.isMine) {
            cell.revealed = true;
          }
        });

        if (typeof triggerIndex === "number") {
          board[triggerIndex].revealed = true;
        }
      }

      function checkWin() {
        if (revealedSafeCells === SIZE * SIZE - MINES) {
          finishGame(true);
        }
      }

      function finishGame(won, triggerIndex) {
        gameOver = true;
        stopTimer();

        if (won) {
          showOverlay("You Win", `用时 ${String(timer).padStart(3, "0")} 秒，全部安全格子已揭开。`);
        } else {
          revealAllMines(triggerIndex);
          showOverlay("Game Over", "你踩到了地雷。点击下方按钮重新开始。");
        }

        renderBoard(triggerIndex);
      }

      function updateMineCounter() {
        mineCountElement.textContent = String(MINES - flagsPlaced).padStart(2, "0");
      }

      function showOverlay(title, message) {
        overlayTitle.textContent = title;
        overlayMessage.textContent = message;
        overlay.classList.add("visible");
      }

      function hideOverlay() {
        overlay.classList.remove("visible");
      }

      function renderBoard(triggerIndex) {
        boardElement.innerHTML = "";

        board.forEach((cell) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "cell";
          button.dataset.index = String(cell.index);
          button.setAttribute("aria-label", `cell ${cell.x + 1}-${cell.y + 1}`);

          if (cell.revealed) {
            button.classList.add("revealed");
            if (cell.isMine) {
              button.classList.add("mine");
              button.classList.add(cell.index === triggerIndex ? "mine-hit" : "mine-revealed");
            } else if (cell.adjacent > 0) {
              button.textContent = String(cell.adjacent);
              button.classList.add(`n${cell.adjacent}`);
            }
          } else if (cell.flagged) {
            button.classList.add("flagged");
          }

          boardElement.appendChild(button);
        });
      }

      function getCellIndexFromEventTarget(target) {
        const cellButton = target.closest(".cell");
        return cellButton ? Number(cellButton.dataset.index) : -1;
      }

      boardElement.addEventListener("click", (event) => {
        const index = getCellIndexFromEventTarget(event.target);
        if (index >= 0) revealCell(index);
      });

      boardElement.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        const index = getCellIndexFromEventTarget(event.target);
        if (index < 0 || gameOver) return;

        const cell = board[index];
        const now = Date.now();
        const isDoubleRight = lastRightClick.index === index && now - lastRightClick.time <= DOUBLE_RIGHT_MS;
        lastRightClick = { index, time: now };

        if (cell.revealed) {
          if (isDoubleRight) {
            chordReveal(index);
          }
          return;
        }

        toggleFlag(index);
      });

      boardElement.addEventListener("mousedown", (event) => {
        if (event.button !== 2 || gameOver) return;
        const index = getCellIndexFromEventTarget(event.target);
        if (index < 0) return;

        const cell = board[index];
        if (!cell.revealed) return;

        window.clearTimeout(rightPressTimer);
        rightPressTimer = window.setTimeout(() => {
          chordReveal(index);
        }, LONG_PRESS_MS);
      });

      ["mouseup", "mouseleave"].forEach((eventName) => {
        boardElement.addEventListener(eventName, () => {
          window.clearTimeout(rightPressTimer);
        });
      });

      boardElement.addEventListener("touchstart", (event) => {
        if (gameOver) return;
        const index = getCellIndexFromEventTarget(event.target);
        if (index < 0) return;

        touchHoldTimer = window.setTimeout(() => {
          const cell = board[index];
          if (cell.revealed) {
            chordReveal(index);
          } else {
            toggleFlag(index);
          }
        }, 360);
      }, { passive: true });

      boardElement.addEventListener("touchend", () => {
        window.clearTimeout(touchHoldTimer);
      }, { passive: true });

      boardElement.addEventListener("touchmove", () => {
        window.clearTimeout(touchHoldTimer);
      }, { passive: true });

      restartButton.addEventListener("click", resetGame);
      overlayRestart.addEventListener("click", resetGame);

      resetGame();
    })();
  </script>
</body>
</html>
